<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spam Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1421;
    --surface2: #131d2e;
    --border: #1e2d45;
    --text: #e2eaf5;
    --muted: #4a6080;
    --green: #00e5a0;
    --red: #ff3d6b;
    --blue: #3d8bff;
    --yellow: #ffd166;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    pointer-events: none;
    animation: float 8s ease-in-out infinite;
  }

  .orb-1 {
    width: 500px; height: 500px;
    background: var(--blue);
    top: -200px; left: -100px;
    animation-delay: 0s;
  }

  .orb-2 {
    width: 400px; height: 400px;
    background: var(--green);
    bottom: -150px; right: -100px;
    animation-delay: 3s;
  }

  .orb-3 {
    width: 300px; height: 300px;
    background: var(--red);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: 6s;
    opacity: 0.06;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .orb-2 { animation-name: float2; }
  @keyframes float2 {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(30px) scale(0.95); }
  }

  /* Main card */
  .card {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    position: relative;
    z-index: 1;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header { margin-bottom: 40px; }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    padding: 5px 12px; border-radius: 100px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  h1 {
    font-size: 2.8rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 10px;
  }

  h1 .highlight { color: var(--green); }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 400;
  }

  /* Samples */
  .samples-label {
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .samples {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 20px;
  }

  .sample-btn {
    padding: 6px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sample-btn:hover { border-color: var(--blue); color: var(--blue); }
  .sample-btn.spam-sample:hover { border-color: var(--red); color: var(--red); }

  /* Textarea */
  .input-wrap { position: relative; margin-bottom: 16px; }

  textarea {
    width: 100%;
    height: 160px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    padding: 16px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--blue); }
  textarea::placeholder { color: var(--muted); }

  .char-count {
    position: absolute;
    bottom: 12px; right: 14px;
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  /* Button */
  .classify-btn {
    width: 100%;
    padding: 18px;
    background: var(--green);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .classify-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,229,160,0.25); }
  .classify-btn:active { transform: translateY(0); }
  .classify-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-inner { display: flex; align-items: center; justify-content: center; gap: 10px; }

  /* Loading spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result {
    margin-top: 20px;
    border-radius: 12px;
    border: 1px solid;
    padding: 24px;
    display: none;
    animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .result.spam {
    background: rgba(255,61,107,0.06);
    border-color: rgba(255,61,107,0.25);
  }

  .result.ham {
    background: rgba(0,229,160,0.06);
    border-color: rgba(0,229,160,0.25);
  }

  .result-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }

  .result-label {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.03em;
  }

  .result.spam .result-label { color: var(--red); }
  .result.ham .result-label { color: var(--green); }

  .result-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 100px;
  }

  .result.spam .result-badge { background: rgba(255,61,107,0.15); color: var(--red); }
  .result.ham .result-badge { background: rgba(0,229,160,0.12); color: var(--green); }

  /* Confidence bar */
  .conf-label {
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }

  .conf-bar-wrap {
    background: var(--surface2);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .conf-bar {
    height: 100%;
    border-radius: 100px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    width: 0%;
  }

  .result.spam .conf-bar { background: var(--red); }
  .result.ham .conf-bar { background: var(--green); }

  .result-note {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Error */
  .error-box {
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(255,61,107,0.08);
    border: 1px solid rgba(255,61,107,0.2);
    border-radius: 10px;
    color: var(--red);
    font-size: 0.82rem;
    font-family: 'JetBrains Mono', monospace;
    display: none;
  }

  /* Footer */
  .footer {
    margin-top: 28px;
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    position: relative; z-index: 1;
    animation: slideUp 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .footer a { color: var(--blue); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .card { padding: 28px 20px; }
    h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card">
  <div class="header">
    <div class="badge"><div class="badge-dot"></div> ML Powered</div>
    <h1>Spam <span class="highlight">Detector</span></h1>
    <p class="subtitle">Logistic Regression + TF-IDF · Trained on 5,500+ SMS messages</p>
  </div>

  <div class="samples-label">Try a sample →</div>
  <div class="samples">
    <button class="sample-btn spam-sample" onclick="load('Congratulations! You won a FREE $1000 prize! Click now to claim!!!')">🚨 Prize scam</button>
    <button class="sample-btn spam-sample" onclick="load('URGENT: Your account is suspended. Verify immediately at http://verify-now.com')">🚨 Phishing</button>
    <button class="sample-btn spam-sample" onclick="load('FREE entry! Text WIN to 87121 now! No purchase needed!')">🚨 SMS spam</button>
    <button class="sample-btn" onclick="load('Hey, are we still on for lunch tomorrow at 1pm?')">✅ Lunch plan</button>
    <button class="sample-btn" onclick="load('Please find attached the Q3 report. Let me know if you have any questions.')">✅ Work email</button>
  </div>

  <div class="input-wrap">
    <textarea id="email-input" placeholder="Paste or type an email / SMS message here..." oninput="updateCount()"></textarea>
    <span class="char-count" id="char-count">0 chars</span>
  </div>

  <button class="classify-btn" id="classify-btn" onclick="classify()">
    <div class="btn-inner">
      <div class="spinner" id="spinner"></div>
      <span id="btn-text">⚡ Classify Message</span>
    </div>
  </button>

  <div class="result" id="result">
    <div class="result-top">
      <div class="result-label" id="result-label"></div>
      <div class="result-badge" id="result-badge"></div>
    </div>
    <div class="conf-label">
      <span>Spam Probability</span>
      <span id="conf-pct"></span>
    </div>
    <div class="conf-bar-wrap">
      <div class="conf-bar" id="conf-bar"></div>
    </div>
    <div class="result-note" id="result-note"></div>
  </div>

  <div class="error-box" id="error-box"></div>
</div>

<div class="footer">
  Built with Flask + scikit-learn ·
  <a href="/health" target="_blank">/health</a> ·
  <a href="https://github.com/druthiD1024/spam-detector" target="_blank">GitHub</a>
</div>

<script>
  function load(text) {
    document.getElementById('email-input').value = text;
    updateCount();
    document.getElementById('result').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
  }

  function updateCount() {
    const len = document.getElementById('email-input').value.length;
    document.getElementById('char-count').textContent = len + ' chars';
  }

  async function classify() {
    const text = document.getElementById('email-input').value.trim();
    if (!text) return;

    const btn   = document.getElementById('classify-btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    const result  = document.getElementById('result');
    const errorBox = document.getElementById('error-box');

    // Loading state
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Classifying...';
    result.style.display = 'none';
    errorBox.style.display = 'none';

    try {
      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'API error');
      }

      const isSpam = data.is_spam;
      const conf   = Math.round(data.confidence * 100);
      const spamProb = isSpam ? conf : 100 - conf;

      // Show result
      result.className = 'result ' + (isSpam ? 'spam' : 'ham');
      result.style.display = 'block';

      document.getElementById('result-label').textContent = isSpam ? '🚨 SPAM' : '✅ Legitimate';
      document.getElementById('result-badge').textContent = conf + '% confident';
      document.getElementById('conf-pct').textContent = spamProb + '%';
      document.getElementById('result-note').textContent = isSpam
        ? 'This message contains patterns commonly found in spam. Do not click any links.'
        : 'This message appears to be legitimate. No strong spam signals detected.';

      setTimeout(() => {
        document.getElementById('conf-bar').style.width = spamProb + '%';
      }, 50);

    } catch (err) {
      errorBox.style.display = 'block';
      errorBox.textContent = '❌ Error: ' + err.message;
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '⚡ Classify Message';
    }
  }

  // Enter key support
  document.getElementById('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) classify();
  });
</script>
</body>
</html>
